<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dang ky passkey</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .mobile-shell {
            max-width: 520px;
        }
    </style>
</head>
<body>
<main class="container mobile-shell py-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
                <div>
                    <h1 class="h4 mb-1">Dang ky passkey</h1>
                    <div class="text-secondary">Nhap ten user de tao passkey moi.</div>
                </div>
                <span id="statusBadge" class="badge text-bg-primary">San sang</span>
            </div>

            <div id="alertBox" class="alert alert-info mb-4">
                Neu passkey da ton tai tren thiet bi nay, he thong se bao da ton tai.
            </div>

            <button id="openModalButton" class="btn btn-primary btn-lg w-100" type="button" data-bs-toggle="modal" data-bs-target="#nameModal">
                Nhap ten user
            </button>
        </div>
    </div>
</main>

<div class="modal fade" id="nameModal" tabindex="-1" aria-labelledby="nameModalTitle" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <form id="registerForm" class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h5" id="nameModalTitle">Nhap ten user</h2>
            </div>
            <div class="modal-body">
                <label for="userName" class="form-label">Ten user</label>
                <input id="userName" class="form-control form-control-lg" name="name" autocomplete="name" required maxlength="80">
            </div>
            <div class="modal-footer">
                <button id="submitButton" class="btn btn-primary" type="submit">Xac nhan tao passkey</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function base64urlToBuffer(value) {
    const base64 = value.replace(/-/g, '+').replace(/_/g, '/')
    const padding = '='.repeat((4 - base64.length % 4) % 4)
    const binary = atob(base64 + padding)
    return Uint8Array.from(binary, char => char.charCodeAt(0)).buffer
}

function bufferToBase64url(buffer) {
    const bytes = new Uint8Array(buffer)
    let binary = ''
    for (const byte of bytes) {
        binary += String.fromCharCode(byte)
    }
    return btoa(binary)
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/g, '')
}

function prepareCreationOptions(options) {
    options.challenge = base64urlToBuffer(options.challenge)
    options.user.id = base64urlToBuffer(options.user.id)
    options.excludeCredentials = (options.excludeCredentials || []).map(credential => ({
        ...credential,
        id: base64urlToBuffer(credential.id)
    }))
    return options
}

function serializeCredential(credential) {
    return {
        id: credential.id,
        rawId: bufferToBase64url(credential.rawId),
        type: credential.type,
        response: {
            clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
            attestationObject: bufferToBase64url(credential.response.attestationObject)
        },
        clientExtensionResults: credential.getClientExtensionResults()
    }
}

function setAlert(type, message) {
    const alertBox = document.getElementById('alertBox')
    alertBox.className = `alert alert-${type} mb-4`
    alertBox.textContent = message
}

function setBusy(isBusy) {
    document.getElementById('submitButton').disabled = isBusy
    document.getElementById('openModalButton').disabled = isBusy
    document.getElementById('statusBadge').textContent = isBusy ? 'Dang xu ly' : 'San sang'
    document.getElementById('statusBadge').className = `badge ${isBusy ? 'text-bg-warning' : 'text-bg-primary'}`
}

window.addEventListener('load', () => {
    bootstrap.Modal.getOrCreateInstance(document.getElementById('nameModal')).show()
})

document.getElementById('registerForm').addEventListener('submit', async (event) => {
    event.preventDefault()
    setBusy(true)

    try {
        if (!window.PublicKeyCredential || !navigator.credentials) {
            throw new Error('Trinh duyet nay khong ho tro passkey. Hay mo link bang Chrome Android.')
        }

        const name = document.getElementById('userName').value.trim()
        const optRes = await fetch('/register/options', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({name})
        })

        const optionBody = await optRes.json()
        if (!optRes.ok) {
            throw new Error(optionBody.error || 'Khong tao duoc yeu cau dang ky')
        }

        const options = prepareCreationOptions(optionBody.publicKey)
        const cred = await navigator.credentials.create({
            publicKey: options
        })

        const verifyRes = await fetch(`/register/verify/${optionBody.session_id}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(serializeCredential(cred))
        })

        const verifyBody = await verifyRes.json()
        if (!verifyRes.ok) {
            throw new Error(verifyBody.error || 'Dang ky that bai')
        }

        bootstrap.Modal.getOrCreateInstance(document.getElementById('nameModal')).hide()
        document.getElementById('openModalButton').classList.add('d-none')
        document.getElementById('statusBadge').textContent = 'Thanh cong'
        document.getElementById('statusBadge').className = 'badge text-bg-success'
        setAlert('success', 'Dang ky passkey thanh cong. QR xac thuc cua user da duoc tao tren man hinh chinh.')
    } catch (error) {
        bootstrap.Modal.getOrCreateInstance(document.getElementById('nameModal')).hide()
        if (error.name === 'InvalidStateError') {
            setAlert('warning', 'Passkey da ton tai tren thiet bi nay.')
        } else if (error.name === 'NotAllowedError') {
            setAlert('warning', 'Thiet bi hoac trinh duyet da huy/chan tao passkey. Hay thu lai tren Chrome Android, dam bao da bat khoa man hinh hoac van tay.')
        } else {
            setAlert('danger', error.message)
        }
        setBusy(false)
    }
})
</script>
</body>
</html>
