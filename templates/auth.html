<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xac thuc passkey</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .mobile-shell {
            max-width: 520px;
        }
    </style>
</head>
<body>
<main class="container mobile-shell py-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
                <div>
                    <h1 class="h4 mb-1">Xac thuc passkey</h1>
                    <div class="text-secondary">Dung passkey da dang ky de xac thuc.</div>
                </div>
                <span id="statusBadge" class="badge text-bg-primary">Dang cho</span>
            </div>
            <div id="alertBox" class="alert alert-info mb-0">Dang yeu cau passkey...</div>
        </div>
    </div>
</main>

<script>
const serverError = {{ error | tojson }}
const sessionId = {{ session_id | tojson }}

function base64urlToBuffer(value) {
    const base64 = value.replace(/-/g, '+').replace(/_/g, '/')
    const padding = '='.repeat((4 - base64.length % 4) % 4)
    const binary = atob(base64 + padding)
    return Uint8Array.from(binary, char => char.charCodeAt(0)).buffer
}

function bufferToBase64url(buffer) {
    if (!buffer) {
        return null
    }

    const bytes = new Uint8Array(buffer)
    let binary = ''
    for (const byte of bytes) {
        binary += String.fromCharCode(byte)
    }
    return btoa(binary)
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/g, '')
}

function prepareRequestOptions(options) {
    options.challenge = base64urlToBuffer(options.challenge)
    options.allowCredentials = (options.allowCredentials || []).map(credential => ({
        ...credential,
        id: base64urlToBuffer(credential.id)
    }))
    return options
}

function serializeCredential(credential) {
    return {
        id: credential.id,
        rawId: bufferToBase64url(credential.rawId),
        type: credential.type,
        response: {
            authenticatorData: bufferToBase64url(credential.response.authenticatorData),
            clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
            signature: bufferToBase64url(credential.response.signature),
            userHandle: bufferToBase64url(credential.response.userHandle)
        },
        clientExtensionResults: credential.getClientExtensionResults()
    }
}

function setStatus(type, badge, message) {
    document.getElementById('statusBadge').textContent = badge
    document.getElementById('statusBadge').className = `badge text-bg-${type}`
    document.getElementById('alertBox').className = `alert alert-${type} mb-0`
    document.getElementById('alertBox').textContent = message
}

(async () => {
    if (serverError) {
        setStatus('danger', 'Loi', serverError)
        return
    }

    try {
        const optRes = await fetch(`/auth/options/${sessionId}`)
        const options = prepareRequestOptions(await optRes.json())

        const cred = await navigator.credentials.get({
            publicKey: options
        })

        const verifyRes = await fetch(`/auth/verify/${sessionId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(serializeCredential(cred))
        })

        const verifyBody = await verifyRes.json()
        if (!verifyRes.ok) {
            if (verifyRes.status === 403) {
                throw new Error(`${verifyBody.error || 'Thiet bi khong cung LAN'} IP: ${verifyBody.client_ip || 'khong ro'}`)
            }
            throw new Error(verifyBody.error || 'Xac thuc that bai')
        }

        setStatus('success', 'Thanh cong', `Xac thuc passkey thanh cong. IP: ${verifyBody.client_ip || 'khong ro'} - ${verifyBody.lan_status || 'Cung LAN'}`)
    } catch (error) {
        setStatus('danger', 'That bai', error.message)
    }
})()
</script>
</body>
</html>
